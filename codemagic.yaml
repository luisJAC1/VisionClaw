workflows:
  ios-workflow:
    name: VisionClaw iOS Build
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: Set bundle ID
        script: |
          sed -i '' 's/com.xiaoanliu.VisionClaw/com.luis.visionclaw/g' samples/CameraAccess/CameraAccess.xcodeproj/project.pbxproj
      - name: Build and archive (no signing)
        script: |
          cd samples/CameraAccess
          xcodebuild \
            -project CameraAccess.xcodeproj \
            -scheme CameraAccess \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath build/CameraAccess.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            archive
      - name: Export IPA (unsigned)
        script: |
          cd samples/CameraAccess

          cat > build/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>compileBitcode</key>
            <false/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          mkdir -p build/ipa
          cd build
          cp -r CameraAccess.xcarchive/Products/Applications/CameraAccess.app ipa/
          cd ipa
          mkdir Payload
          cp -r CameraAccess.app Payload/
          zip -r ../CameraAccess-unsigned.ipa Payload/
    artifacts:
      - samples/CameraAccess/build/CameraAccess-unsigned.ipa
