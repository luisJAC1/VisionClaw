workflows:
  ios-workflow:
    name: VisionClaw iOS Build
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: Set bundle ID
        script: |
          sed -i '' 's/com.xiaoanliu.VisionClaw/com.luis.visionclaw/g' samples/CameraAccess/CameraAccess.xcodeproj/project.pbxproj
      - name: Build iOS app (no signing)
        script: |
          cd samples/CameraAccess
          xcodebuild \
            -project CameraAccess.xcodeproj \
            -scheme CameraAccess \
            -configuration Debug \
            -destination generic/platform=iOS \
            CODE_SIGNING_ALLOWED=NO \
            build
    artifacts:
      - samples/CameraAccess/build/**/*.app
