workflows:
  ios-workflow:
    name: VisionClaw iOS Build
    max_build_duration: 60
    environment:
      xcode: latest
      ios_signing:
        distribution_type: development
        bundle_identifier: com.luis.visionclaw
    scripts:
      - name: Set bundle ID
        script: |
          sed -i '' 's/com.xiaoanliu.VisionClaw/com.luis.visionclaw/g' samples/CameraAccess/CameraAccess.xcodeproj/project.pbxproj
      - name: Build iOS app
        script: |
          cd samples/CameraAccess
          xcodebuild \
            -project CameraAccess.xcodeproj \
            -scheme CameraAccess \
            -configuration Debug \
            -destination generic/platform=iOS \
            -archivePath build/CameraAccess.xcarchive \
            archive
          xcodebuild \
            -exportArchive \
            -archivePath build/CameraAccess.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist $CM_EXPORT_OPTIONS_PATH
    artifacts:
      - build/ipa/*.ipa
